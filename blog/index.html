<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-content flex space-around">
        <div class="create-blogpost">
            <form id="blogForm" class="flex column">
                <label for="title">Title:</label>
                <input type="text" id="title">

                <label for="message">Message:</label>
                <textarea name="message" id="message"></textarea>

                <p id="dateTime"></p>

                <button id="submitButton">Post message</button>
            </form>
        </div>
        <div class="blogpost-content">
            <div class="blogpost-searchbar">
                <p>Searchbar:</p>
                <input type="text" id="searchbar">
            </div>
            <div class="blogposts">
                <p>Messages:</p>
            </div>
        </div>
    </div>

    <!-- MODAL GETS OPENED SEPERATELY WHEN TRYING TO EDIT A BLOGPOST -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Blog Post</h2>
            <label for="editTitle">Title:</label>
            <input type="text" id="editTitle">
            <label for="editMessage">Message:</label>
            <textarea id="editMessage"></textarea>
            <button id="saveEdit">Save Changes</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
