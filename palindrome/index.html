<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome</title>
</head>
<body>
    <h1>Check Of een woord of zin een palindroom is</h1>
    <div class="wordinput">
        <label for="userWord">Typ hier uw woord:</label>
        <br>
        <input type="text" id="userWord">
        <br>
        <button id="wordCheck">Check of het ingevoerde woord een palindroom is</button>
        <br>
        <p id="wordOutput"></p>
    </div>

    <div class="scentenceInput">
        <label for="userScentence">Typ hier uw zin:</label>
        <br>
        <input type="text" id="userScentence">
        <br>
        <button id="scentenceCheck">Check of de ingevoerde zin een palindroom is.</button>
        <br>
        <p id="scentenceOutput"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
